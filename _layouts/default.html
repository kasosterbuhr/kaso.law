<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}?v={{ site.time | date: '%s' }}">
    <link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}?v={{ site.time | date: '%s' }}">
    <link rel="icon" type="image/png" sizes="256x256" href="{{ '/assets/images/favicon-256.png' | relative_url }}?v={{ site.time | date: '%s' }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  </head>
  <body>
    <header class="top-nav">
      <div class="nav-container">
        <a class="nav-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="nav-menu">
          <a href="{{ '/about' | relative_url }}">About</a>
          <a href="{{ '/why' | relative_url }}">Why</a>
          <a href="{{ '/tech-stack' | relative_url }}">Tech Stack</a>
          <a href="{{ '/prompts' | relative_url }}">Prompts</a>
          <a href="{{ '/brief' | relative_url }}">AI FIRAC</a>
          <a href="{{ '/account' | relative_url }}">Account</a>
          <a href="{{ '/classroom' | relative_url }}">Classroom</a>
        </nav>
        <a href="https://github.com/ai-prose" class="github-cta" target="_blank" rel="noreferrer">View on GitHub &rarr;</a>
        <button class="hamburger" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>
    <div class="site-banner">
      <img src="{{ '/assets/images/banner.jpg' | relative_url }}?v={{ site.time | date: '%s' }}" alt="AI Pro Se" class="banner-image" />
    </div>
    <div class="page-shell">
      <div class="account-greeting" id="account-greeting" hidden></div>
      <main class="site-content">
        {{ content }}
      </main>
      <footer class="site-footer">
        &copy; {{ site.time | date: "%Y" }} {{ site.title }}
      </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script>
      window.KASO_CONFIG = {
        openaiPublicApiKey: {{ site.openai_public_api_key | default: "" | jsonify }},
        openaiModel: {{ site.openai_client_model | default: "gpt-5.4" | jsonify }},
        openaiReporterModel: {{ site.openai_reporter_model | default: "gpt-5.2" | jsonify }},
        serverApiBaseUrl: {{ site.server_api_base_url | default: "" | jsonify }}
      };

      window.kasoCookies = {
        get: function (name) {
          const prefix = String(name || "") + "=";
          const parts = document.cookie ? document.cookie.split(";") : [];

          for (let index = 0; index < parts.length; index += 1) {
            const part = parts[index].trim();

            if (part.indexOf(prefix) === 0) {
              return decodeURIComponent(part.slice(prefix.length));
            }
          }

          return "";
        },
        set: function (name, value, maxAgeSeconds) {
          const encodedName = String(name || "");
          const encodedValue = encodeURIComponent(String(value || ""));
          const cookieParts = [
            encodedName + "=" + encodedValue,
            "path=/",
            "SameSite=Lax",
            "Max-Age=" + String(maxAgeSeconds || 31536000)
          ];

          if (window.location.protocol === "https:") {
            cookieParts.push("Secure");
          }

          document.cookie = cookieParts.join("; ");
        },
        remove: function (name) {
          const cookieParts = [
            String(name || "") + "=",
            "path=/",
            "SameSite=Lax",
            "Max-Age=0"
          ];

          if (window.location.protocol === "https:") {
            cookieParts.push("Secure");
          }

          document.cookie = cookieParts.join("; ");
        }
      };

      window.kasoConfirmProviderStorage = function (providerLabel) {
        return window.confirm(
          providerLabel +
            " will be stored in a browser cookie on this device so this site can reuse it later. " +
            "That means it stays client-side and under your control, but it is not secret from this browser. Continue only on a trusted personal device."
        );
      };
    </script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const hamburger = document.querySelector('.hamburger');
        const navMenu = document.querySelector('.nav-menu');
        const greeting = document.getElementById('account-greeting');

        if (hamburger && navMenu) {
          hamburger.addEventListener('click', function() {
            navMenu.classList.toggle('active');
          });
        }

        function updateGreeting() {
          if (!greeting) {
            return;
          }

          const cookies = window.kasoCookies;
          const displayName = cookies && typeof cookies.get === 'function'
            ? cookies.get('kaso_profile_name').trim()
            : '';

          if (!displayName) {
            greeting.hidden = true;
            greeting.textContent = '';
            return;
          }

          greeting.textContent = "Welcome in " + displayName + "! Let's go get 'em.";
          greeting.hidden = false;
        }

        updateGreeting();
        window.addEventListener('kaso-account-updated', updateGreeting);
      });
    </script>
  </body>
</html>
