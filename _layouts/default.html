<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  </head>
  <body>
    <header class="top-nav">
      <div class="nav-container">
        <a class="nav-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="nav-menu">
          <a href="{{ '/about' | relative_url }}">About</a>
          <a href="{{ '/why' | relative_url }}">Why</a>
          <a href="{{ '/tech-stack' | relative_url }}">Tech Stack</a>
          <a href="{{ '/prompts' | relative_url }}">Prompts</a>
          <a href="{{ '/classroom' | relative_url }}">Classroom</a>
        </nav>
        <a href="https://github.com/ai-prose" class="github-cta" target="_blank">View on GitHub →</a>
        <button class="hamburger" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>
    <div class="site-banner">
      <img src="{{ '/assets/images/banner.jpg' | relative_url }}?v={{ site.time | date: '%s' }}" alt="AI Pro Se" class="banner-image" />
    </div>
    <div class="page-shell">
      <main class="site-content">
        {{ content }}
      </main>
      <footer class="site-footer">
        © {{ site.time | date: "%Y" }} {{ site.title }}
      </footer>
    </div>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const hamburger = document.querySelector('.hamburger');
        const navMenu = document.querySelector('.nav-menu');
        
        hamburger.addEventListener('click', function() {
          navMenu.classList.toggle('active');
        });
      });
    </script>
  </body>
</html>
