<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  </head>
  <body>
    <header class="site-hero{% if page.banner_image %} has-banner{% endif %}" style="{% if page.banner_image %}background-image: url('{{ page.banner_image | relative_url }}');{% endif %}{% if page.banner_height %} height: {{ page.banner_height }};{% endif %}">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="brand-line">
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <p class="site-tagline">{{ site.description }}</p>
        </div>
      </div>
    </header>
    <div class="page-shell">
      <main class="site-content">
        {{ content }}
      </main>
      <footer class="site-footer">
        © {{ site.time | date: "%Y" }} {{ site.title }}
      </footer>
    </div>
  </body>
</html>
