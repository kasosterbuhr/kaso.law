<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}?v={{ site.time | date: '%s' }}">
    <link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}?v={{ site.time | date: '%s' }}">
    <link rel="icon" type="image/png" sizes="256x256" href="{{ '/assets/images/favicon-256.png' | relative_url }}?v={{ site.time | date: '%s' }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  </head>
  <body>
    <header class="top-nav">
      <div class="nav-container">
        <a class="nav-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="nav-menu">
          <a href="{{ '/about' | relative_url }}">About</a>
          <a href="{{ '/why' | relative_url }}">Why</a>
          <a href="{{ '/tech-stack' | relative_url }}">Tech Stack</a>
          <a href="{{ '/prompts' | relative_url }}">Prompts</a>
          <a href="{{ '/brief' | relative_url }}">AI FIRAC</a>
          <a href="{{ '/account' | relative_url }}">Account</a>
          <a href="{{ '/classroom' | relative_url }}">Classroom</a>
        </nav>
        <a href="https://github.com/ai-prose" class="github-cta" target="_blank">View on GitHub →</a>
        <button class="hamburger" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>
    <div class="site-banner">
      <img src="{{ '/assets/images/banner.jpg' | relative_url }}?v={{ site.time | date: '%s' }}" alt="AI Pro Se" class="banner-image" />
    </div>
    <div class="page-shell">
      <div class="account-greeting" id="account-greeting" hidden></div>
      <main class="site-content">
        {{ content }}
      </main>
      <footer class="site-footer">
        © {{ site.time | date: "%Y" }} {{ site.title }}
      </footer>
    </div>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const hamburger = document.querySelector('.hamburger');
        const navMenu = document.querySelector('.nav-menu');
        const greeting = document.getElementById('account-greeting');
        const apiBase = window.localStorage.getItem('kasoFiracApiBase') || '';

        if (hamburger && navMenu) {
          hamburger.addEventListener('click', function() {
            navMenu.classList.toggle('active');
          });
        }

        function updateGreeting() {
          if (!greeting) {
            return;
          }

          const base = (window.localStorage.getItem('kasoFiracApiBase') || '').trim();
          if (!base) {
            greeting.hidden = true;
            greeting.textContent = '';
            return;
          }

          fetch(base.replace(/\/+$/, '') + '/api/account', {
            method: 'GET',
            credentials: 'include'
          })
            .then(function(response) {
              return response.json().then(function(data) {
                return { ok: response.ok, data: data };
              });
            })
            .then(function(result) {
              if (!result.ok || !result.data || !result.data.displayName) {
                greeting.hidden = true;
                greeting.textContent = '';
                return;
              }

              greeting.textContent = "Welcome in " + result.data.displayName + "! Let's go get 'em.";
              greeting.hidden = false;
            })
            .catch(function() {
              greeting.hidden = true;
              greeting.textContent = '';
            });
        }

        updateGreeting();
        window.addEventListener('kaso-account-updated', updateGreeting);
      });
    </script>
  </body>
</html>
